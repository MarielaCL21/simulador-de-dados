<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Dados</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Simulador de Lanzamiento de Dados</h1>
        
        <label for="dados">Cantidad de dados:</label>
        <input type="number" id="dados" value="" min="1">
<br>
        <label for="lanzamientos">Cantidad de lanzamientos:</label>
        <input type="number" id="lanzamientos" value="" min="1">
<br>

        <button onclick="simular()">Simular</button>
        
      

        <div class="botones">
            
            <button onclick="verHistograma()">Ver Histograma</button>
            
            <button onclick="mostrarMenorMayor()">Mostrar Menor y Mayor</button>

        </div>

        <h3>Historial de lanzamientos</h3>
        <div id="historial" style="max-height:300px; overflow-y:auto; text-align:left; border:1px solid #ccc; padding:10px; border-radius:5px;">
            
        </div>
        <h2 id="resultado"></h2>

        <canvas id="grafico" style="max-width: 100%; height: 300px; margin-top: 20px;"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
